<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miner Tycoon - Autonomous Extraction</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7b2ff7;
            --bg: #050510;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 242, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            background: radial-gradient(circle at bottom, #101030 0%, #050510 100%);
            color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .status-bar {
            padding: 25px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
        }
        .diamond-display { font-size: 1.8rem; font-weight: 900; color: var(--primary); text-shadow: 0 0 15px rgba(0,242,255,0.4); }
        .rate-display { font-size: 0.8rem; color: #00ff88; letter-spacing: 1px; }

        .mine-zone {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
        }
        .drill-machine {
            font-size: 5rem; animation: vibrate 0.1s infinite; display: none;
            filter: drop-shadow(0 0 20px var(--primary));
        }
        @keyframes vibrate { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }

        .shop-container {
            background: rgba(0,0,0,0.6); padding: 20px; border-top: 2px solid var(--primary);
            border-radius: 30px 30px 0 0; max-height: 50vh; overflow-y: auto;
        }

        .upgrade-item {
            background: var(--card); border: 1px solid var(--border); padding: 15px;
            border-radius: 20px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; transition: 0.3s;
        }

        .info h4 { color: var(--primary); font-size: 1rem; }
        .info p { font-size: 0.7rem; color: #888; }

        .buy-btn {
            background: var(--primary); color: #000; border: none; padding: 10px 15px;
            border-radius: 12px; font-weight: 800; cursor: pointer;
        }

        /* ปุ่มย้อนกลับ */
        .back-btn { 
            position: absolute; top: 100px; left: 20px; background: rgba(255,255,255,0.1);
            color: white; padding: 12px 20px; border-radius: 15px; text-decoration: none; 
            font-size: 0.9rem; font-weight: bold; border: 1px solid var(--border); z-index: 100;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <div>
            <div class="diamond-display">💎 <span id="diamonds">0</span></div>
            <div class="rate-display">PRODUCTION: +<span id="rate">0</span>/s</div>
        </div>
    </div>

    <a href="javascript:void(0)" onclick="exitToHub()" class="back-btn">⬅ HUB</a>

    <div class="mine-zone">
        <div id="drill" class="drill-machine">⚒️</div>
        <p id="status-text" style="color: #444;">No Drones Active</p>
    </div>

    <div class="shop-container">
        <h3 style="margin-bottom: 15px; font-size: 0.9rem; letter-spacing: 2px; color: #777;">MANAGEMENT PANEL</h3>
        <div class="upgrade-item">
            <div class="info"><h4>Nano Drone</h4><p>ขุดอัตโนมัติ +1/วินาที</p></div>
            <button class="buy-btn" id="buy-drone" onclick="buyUpgrade('drone', 100)">100 💎</button>
        </div>
        <div class="upgrade-item">
            <div class="info"><h4>Power Drill</h4><p>ขุดอัตโนมัติ +5/วินาที</p></div>
            <button class="buy-btn" id="buy-drill" onclick="buyUpgrade('drill', 450)">450 💎</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA21Am8gAcwgzaB2UfTsCCyRa6NpquAGTA",
            authDomain: "webgame-fb202.firebaseapp.com",
            databaseURL: "https://webgame-fb202-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "webgame-fb202",
            storageBucket: "webgame-fb202.firebasestorage.app",
            messagingSenderId: "325793223841",
            appId: "1:325793223841:web:ed3c2e50cebd389dc48ce0"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const user = localStorage.getItem("username") || "Guest";
        const userRef = database.ref('players/' + user);

        let diamonds = 0;
        let autoRate = 0;
        let mainInterval;

        userRef.on('value', (snap) => {
            const data = snap.val();
            if (data) {
                diamonds = data.diamonds || 0;
                autoRate = data.autoRate || 0;
                document.getElementById('diamonds').innerText = Math.floor(diamonds).toLocaleString();
                document.getElementById('rate').innerText = autoRate;
                if(autoRate > 0) document.getElementById('drill').style.display = 'block';
            }
        });

        function buyUpgrade(type, cost) {
            if (diamonds >= cost) {
                let bonus = (type === 'drone') ? 1 : 5;
                userRef.update({ diamonds: diamonds - cost, autoRate: autoRate + bonus });
            } else { alert("เพชรไม่พอ!"); }
        }

        function startMining() {
            mainInterval = setInterval(() => {
                if (autoRate > 0) {
                    diamonds += (autoRate / 10);
                    userRef.update({ diamonds: diamonds });
                }
            }, 100);
        }

        // ฟังก์ชันแก้ไขเพื่อให้กดได้ทันทีโดยไม่เปลี่ยน Logic เดิม
        function exitToHub() {
            if (mainInterval) clearInterval(mainInterval);
            userRef.update({ status: "Online" }); 
            window.location.href = "gamehub.html";
        }

        startMining();
    </script>
</body>
</html>
